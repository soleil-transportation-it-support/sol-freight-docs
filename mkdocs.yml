site_name: Soleil Freight BRD
site_description: Internal BRD portal for Soleil Transportation
site_url: https://soleil-transportation-it-support.github.io/sol-freight-docs/
repo_url: https://github.com/soleil-transportation-it-support/sol-freight-docs
repo_name: Soleil / sol-freight-docs

theme:
  name: material
  language: en
  font:
    text: Inter
    code: Inter
  palette:
    - scheme: default
      primary: amber
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

extra_css:
  - stylesheets/solfreight-theme.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Program Roadmap: roadmap.md
  - Ocean Export:
      - Overview: ocean-export/index.md
      - MBL BRD: ocean-export/mbl.md
      - HBL BRD: ocean-export/hbl.md
  - Trade Partners: trade-partners.md
